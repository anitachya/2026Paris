<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paris 2026 ✦ Bon Voyage</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --ivory: #FAF8F3;
  --white: #FFFFFF;
  --ink: #1C1A17;
  --ink-light: #4A4540;
  --gold: #B8965A;
  --gold-pale: #E8D9BE;
  --sage: #7A9080;
  --rose: #C4847A;
  --blue: #3D5A7A;
  --border: rgba(184,150,90,0.18);
  --shadow-soft: 0 2px 20px rgba(28,26,23,0.06);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { background: var(--ivory); color: var(--ink); font-family: "Jost", sans-serif; font-weight: 300; line-height: 1.7; }

nav {
  position: fixed; top:0; left:0; right:0; z-index: 100;
  background: rgba(250,248,243,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; height: 60px;
}
.nav-logo { font-family: "Cormorant Garamond", serif; font-size: 1.1rem; font-weight: 400; letter-spacing: 0.08em; color: var(--ink); }
.nav-logo em { color: var(--gold); font-style: italic; }
.nav-links { display:flex; gap:32px; align-items:center; }
.nav-links a { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-light); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover { color: var(--gold); }
.nav-dot { width:4px; height:4px; border-radius:50%; background: var(--gold); opacity:0.5; }

.hero {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 80px 40px 60px; position: relative; overflow: hidden;
  background: var(--ivory);
}
.hero-tower { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); opacity: 0.10; pointer-events: none; }
.hero-eyebrow { font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 24px; display: flex; align-items: center; gap: 14px; }
.hero-eyebrow::before, .hero-eyebrow::after { content: ""; width: 32px; height: 1px; background: var(--gold); opacity: 0.5; }
.hero-title { font-family: "Cormorant Garamond", serif; font-size: clamp(3.5rem, 8vw, 7rem); font-weight: 300; line-height: 1.05; margin-bottom: 8px; color: var(--ink); }
.hero-title em { font-style: italic; color: var(--gold); }
.hero-subtitle { font-family: "Cormorant Garamond", serif; font-size: clamp(1.1rem, 2.5vw, 1.6rem); font-weight: 300; font-style: italic; color: var(--ink-light); margin-bottom: 40px; }
.hero-meta { display: flex; gap: 40px; align-items: center; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); }
.hero-meta-item { display:flex; flex-direction:column; align-items:center; gap:4px; }
.hero-meta-num { font-family: "DM Mono", monospace; font-size: 1.6rem; color: var(--ink); font-weight: 400; line-height: 1; }
.hero-divider { width:1px; height:40px; background: var(--border); }

.section { padding: 80px 40px; max-width: 1100px; margin: 0 auto; }
.section-label { font-size: 0.66rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.section-label::after { content:""; flex:1; height:1px; background:var(--border); }
.section-title { font-family: "Cormorant Garamond", serif; font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 300; margin-bottom: 48px; line-height: 1.2; }
.section-title em { font-style: italic; color: var(--gold); }

.trip-strip { display: grid; grid-template-columns: repeat(16, 1fr); gap: 3px; margin-bottom: 60px; }
.day-pill { background: var(--white); border: 1px solid var(--border); border-radius: 4px; padding: 10px 6px; text-align: center; cursor: pointer; transition: all 0.2s; }
.day-pill:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: var(--shadow-soft); }
.day-pill.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
.day-pill.active .dp-date { color: var(--gold-pale); }
.day-pill.active .dp-day { color: rgba(255,255,255,0.6); }
.dp-date { font-family: "DM Mono", monospace; font-size: 0.75rem; display:block; }
.dp-day { font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light); display:block; margin-top:2px; }
.dp-dot { width:4px; height:4px; border-radius:50%; background:var(--gold); margin: 5px auto 0; }

.day-header { display: grid; grid-template-columns: auto 1fr; gap: 32px; align-items: start; padding: 40px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
.day-number { font-family: "Cormorant Garamond", serif; font-size: 5rem; font-weight: 300; line-height: 1; color: var(--gold-pale); position: relative; }
.day-number::after { content: attr(data-month); position: absolute; bottom: 0; left: 0; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); font-family: "Jost", sans-serif; font-weight: 400; }
.day-title-en { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
.day-title { font-family: "Cormorant Garamond", serif; font-size: 2.2rem; font-weight: 300; line-height: 1.2; margin-bottom: 10px; }
.day-summary { font-size: 0.82rem; color: var(--ink-light); line-height: 1.7; padding: 10px 14px; border-left: 2px solid var(--gold-pale); }

.timeline { position:relative; padding-left: 32px; }
.timeline::before { content:""; position:absolute; left:7px; top:0; bottom:0; width:1px; background: linear-gradient(to bottom, transparent, var(--border) 5%, var(--border) 95%, transparent); }
.tl-slot { margin-bottom: 32px; position: relative; }
.tl-slot-label { font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; position: relative; }
.tl-slot-label::before { content:""; width:15px; height:15px; border-radius:50%; border: 1px solid var(--gold); background: var(--ivory); position:absolute; left:-32px; top:-1px; }
.tl-slot-label.morning::before { background: var(--gold); }
.tl-items { display:flex; flex-direction:column; gap:10px; }
.tl-item { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; display: flex; gap: 12px; align-items: start; transition: all 0.2s; }
.tl-item:hover { border-color: var(--gold-pale); box-shadow: var(--shadow-soft); }
.tl-item-name { font-family: "Cormorant Garamond", serif; font-size: 1.05rem; font-weight: 400; margin-bottom: 3px; }
.tl-item-name a { color: var(--ink); text-decoration: none; }
.tl-item-name a:hover { color: var(--blue); }
.tl-item-time { font-family: "DM Mono", monospace; font-size: 0.72rem; color: var(--ink-light); margin-bottom: 4px; }
.tl-item-note { font-size: 0.76rem; color: var(--ink-light); font-style: italic; line-height: 1.6; }
.tl-item-tag { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; white-space: nowrap; background: rgba(184,150,90,0.1); color: var(--gold); border: 1px solid rgba(184,150,90,0.3); align-self: start; flex-shrink: 0; margin-left: 8px; }

.spot-note { width:100%; border:none; border-bottom:1px dashed rgba(184,150,90,0.3); background:transparent; font-family:"Jost",sans-serif; font-size:0.74rem; font-weight:300; color:var(--ink); resize:none; outline:none; padding:4px 0; line-height:1.6; transition:border-color 0.2s; margin-top:8px; display:block; }
.spot-note:focus { border-color: var(--gold); }

.tips-grid { display:flex; flex-direction:column; gap:10px; margin-top:24px; }
.tip-card { background: rgba(184,150,90,0.05); border: 1px solid rgba(184,150,90,0.2); border-radius: 10px; padding: 14px 16px; display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: start; }
.tip-icon { font-size: 1.1rem; line-height: 1.4; }
.tip-title { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
.tip-content { font-size: 0.78rem; color: var(--ink-light); line-height: 1.75; }

.food-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:14px; margin-top: 24px; }
.food-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: all 0.2s; }
.food-card:hover { border-color: var(--gold-pale); box-shadow: var(--shadow-soft); }
.food-card-type { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rose); margin-bottom: 7px; }
.food-card-name { font-family: "Cormorant Garamond", serif; font-size: 1rem; font-weight: 400; margin-bottom: 5px; }
.food-card-desc { font-size: 0.74rem; color: var(--ink-light); line-height: 1.6; }
.food-card-price { font-family: "DM Mono", monospace; font-size: 0.68rem; color: var(--sage); margin-top: 8px; }

.notes-box { background: var(--white); border: 1px dashed var(--border); border-radius: 10px; padding: 20px; margin-top: 32px; }
.notes-box-label { font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 10px; display:flex; align-items:center; gap:7px; }
.notes-box textarea { width:100%; border:none; outline:none; resize:vertical; font-family: "Jost", sans-serif; font-size: 0.82rem; font-weight:300; color: var(--ink); background: transparent; min-height: 80px; line-height: 1.7; }
.notes-box textarea::placeholder { color: rgba(74,69,64,0.35); }

.page-nav { display:flex; justify-content:space-between; align-items:center; padding: 32px 0; border-top: 1px solid var(--border); margin-top: 60px; }
.page-nav-btn { display:flex; align-items:center; gap:8px; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); cursor:pointer; background:none; border:none; transition: color 0.2s; padding: 8px 0; font-family: "Jost", sans-serif; }
.page-nav-btn:hover { color: var(--gold); }
.page-nav-date { font-family: "DM Mono", monospace; font-size: 0.78rem; color: var(--ink-light); text-align:center; }
</style>
</head>

const SLOT_LABELS = {morning:"Morning · 早上", afternoon:"Afternoon · 下午", evening:"Evening · 晚上"};

function renderStrip() {
  const strip = document.getElementById("day-strip");
  strip.innerHTML = DAYS.map((d,i) => `
    <div class="day-pill has-events" onclick="showDay(${i})" id="pill-${i}">
      <span class="dp-date">${d.date}</span>
      <span class="dp-day">${d.dow}</span>
      <span class="dp-dot"></span>
    </div>`).join("");
  showDay(1);
}

function showDay(idx) {
  document.querySelectorAll(".day-pill").forEach((p,i) => p.classList.toggle("active", i===idx));
  const container = document.getElementById("day-details");
  const day = DAYS[idx];

  let slotsHtml = "";
  ["morning","afternoon","evening"].forEach(slot => {
    if (!day.slots[slot] || !day.slots[slot].length) return;
    slotsHtml += `<div class="tl-slot">
      <div class="tl-slot-label ${slot}">${SLOT_LABELS[slot]}</div>
      <div class="tl-items">
        ${day.slots[slot].map(ev => `
          <div class="tl-item">
            <div style="flex:1;">
              ${ev.time ? `<div class="tl-item-time">🕐 ${ev.time}</div>` : ""}
              <div class="tl-item-name">
                ${ev.maps ? `<a href="${ev.maps}" target="_blank">↗ ${ev.name}</a>` : ev.name}
              </div>
              ${ev.note ? `<div class="tl-item-note">${ev.note}</div>` : ""}
              <textarea class="spot-note" rows="1" placeholder="＋ 新增備註、推薦連結..."
                onfocus="this.style.borderColor='var(--gold)';autoResize(this)"
                onblur="this.style.borderColor='rgba(184,150,90,0.3)'"
                oninput="autoResize(this)"></textarea>
            </div>
            ${(ev.pass || day.pass) ? `<span class="tl-item-tag">通行證</span>` : ""}
          </div>`).join("")}
      </div>
    </div>`;
  });

  let tipsHtml = "";
  if (day.tips && day.tips.length) {
    tipsHtml = `<div style="margin-top:48px;">
      <div class="section-label" style="margin-bottom:14px;">Conseils · 攻略錦囊</div>
      <div class="tips-grid">
        ${day.tips.map(t => `
          <div class="tip-card">
            <div class="tip-icon">${t.icon}</div>
            <div>
              <div class="tip-title">${t.title}</div>
              <div class="tip-content">${t.content}</div>
            </div>
          </div>`).join("")}
      </div>
    </div>`;
  }

  let foodHtml = "";
  if (day.food && day.food.length) {
    foodHtml = `<div style="margin-top:48px;">
      <div class="section-label" style="margin-bottom:14px;">Gastronomie · 周邊美食</div>
      <div class="food-grid">
        ${day.food.map(f => `
          <div class="food-card">
            <div class="food-card-type">${f.type}</div>
            <div class="food-card-name">${f.name}</div>
            <div class="food-card-desc">${f.desc}</div>
            <div class="food-card-price">${f.price}</div>
          </div>`).join("")}
      </div>
    </div>`;
  }

  container.innerHTML = `
    <div>
      <div class="day-header">
        <div class="day-number" data-month="May">${day.date.split("/")[1]}</div>
        <div>
          <div class="day-title-en">${day.dow} · ${day.label}</div>
          <h3 class="day-title">${day.label}</h3>
          <div class="day-summary">${day.summary}</div>
        </div>
      </div>
      <div class="timeline">${slotsHtml}</div>
      ${tipsHtml}
      ${foodHtml}
      <div class="notes-box" style="margin-top:40px;">
        <div class="notes-box-label">✦ 當日補充筆記</div>
        <textarea placeholder="在這裡記錄旅途中的發現、社群推薦或任何想留下的文字..."></textarea>
      </div>
      <div class="page-nav">
        <button class="page-nav-btn" onclick="showDay(${idx-1})" ${idx===0?'style="opacity:0;pointer-events:none"':""}> ← 前一天</button>
        <div class="page-nav-date">Day ${idx+1} of 16</div>
        <button class="page-nav-btn" onclick="showDay(${idx+1})" ${idx===15?'style="opacity:0;pointer-events:none"':""}> 後一天 →</button>
      </div>
    </div>`;
}

function autoResize(el) { el.style.height="auto"; el.style.height=el.scrollHeight+"px"; }
